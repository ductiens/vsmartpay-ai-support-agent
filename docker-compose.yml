version: "3.8"

services:
  mongo:
    image: mongo:latest
    container_name: mini-wallet-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: mini_wallet
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mini-wallet-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-wallet-api
    environment:
      MONGODB_URL: mongodb://admin:admin123@mongo:27017
      DATABASE_NAME: mini_wallet
      DEBUG: "False"
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - mini-wallet-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  mini-wallet-network:
    driver: bridge

volumes:
  mongo_data:
